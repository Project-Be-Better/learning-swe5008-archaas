version: "3.8"

services:
  orchestrator:
    build:
      context: .
      dockerfile: ./src/orchestrator_v2/Dockerfile
    container_name: trace-orchestrator
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
    command: python -m src.orchestrator_v2.main_fastapi
